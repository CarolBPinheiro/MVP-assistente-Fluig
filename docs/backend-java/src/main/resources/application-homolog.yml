# Configuração para ambiente de Homologação
# Copie este arquivo e configure as credenciais do servidor

spring:
  datasource:
    # CONFIGURAR: URL do servidor PostgreSQL de homologação
    url: jdbc:postgresql://SERVIDOR_HOMOLOG:5432/fluig_db
    # CONFIGURAR: Usuário do banco
    username: SEU_USUARIO
    # CONFIGURAR: Senha do banco
    password: SUA_SENHA
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 15
      minimum-idle: 5
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

# AI Gateway - Manter a mesma API key do ambiente principal
ai:
  gateway:
    api-key: ${LOVABLE_API_KEY}
    model: google/gemini-3-flash-preview
    temperature: 0.7
    max-tokens: 2048

# CORS - Configurar origens específicas em homologação
cors:
  allowed-origins: 
    - https://fluig-homolog.fortbras.com.br
    - https://assistente-homolog.fortbras.com.br

# Logging mais detalhado para debug
logging:
  level:
    root: INFO
    com.fortbras.fluig: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
