server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: fluig-assistente-api
  
  datasource:
    url: ${FLUIG_DATABASE_URL:jdbc:postgresql://localhost:5432/fluig_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1200000
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# AI Gateway Configuration
ai:
  gateway:
    api-key: ${LOVABLE_API_KEY:}
    model: google/gemini-3-flash-preview
    temperature: 0.7
    max-tokens: 2048

# CORS Configuration
cors:
  allowed-origins: "*"

# Logging
logging:
  level:
    root: INFO
    com.fortbras.fluig: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
