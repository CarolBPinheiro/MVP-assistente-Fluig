# Configuração para ambiente de Desenvolvimento Local

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/fluig_dev
    username: postgres
    password: postgres
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

# AI Gateway
ai:
  gateway:
    api-key: ${LOVABLE_API_KEY:dev-key-placeholder}
    model: google/gemini-3-flash-preview
    temperature: 0.7
    max-tokens: 2048

# CORS - Permitir tudo em dev
cors:
  allowed-origins: "*"

# Logging detalhado
logging:
  level:
    root: INFO
    com.fortbras.fluig: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
